/* SEARCH */

const input=document.getElementById("drugInput")

input.addEventListener("input",function(){

let value=removeVN(this.value)

let results=drugs.filter(d=>removeVN(d.name).includes(value))

show(results)

})

/* ENTER CHỌN THUỐC */

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let first=document.querySelector(".suggestItem")

if(first) first.click()

}

})

function show(list){

let box=document.getElementById("drugSuggestions")

box.innerHTML=""

list.forEach(d=>{

let div=document.createElement("div")

div.className="suggestItem"
div.innerText=d.name

div.onclick=function(){

input.value=d.name
box.innerHTML=""

calculate()

}

box.appendChild(div)

})

}

/* TÍNH CrCl */

function calcCrCl(){

let age=parseFloat(document.getElementById("age").value)
let weight=parseFloat(document.getElementById("weight").value)
let creat=parseFloat(document.getElementById("creat").value)
let sex=document.getElementById("sex").value

if(!age || !weight || !creat) return null

let scr=creat/88.4

let crcl=((140-age)*weight)/(72*scr)

if(sex==="female") crcl*=0.85

return crcl

}

/* CALCULATE */

function calculate(){

let crcl = calcCrCl()

let drug = drugs.find(d => d.name === input.value)

if(!drug) return

let weight = parseFloat(document.getElementById("weight").value)

let html = ""

if(crcl){
html += "<h3>CrCl: " + crcl.toFixed(1) + " mL/min</h3>"
}else{
html += "<h3>Tra cứu liều (chưa nhập thông tin)</h3>"
}

html += "<b>" + drug.name + "</b>"

html += "<table>"
html += "<tr><th>CrCl</th><th>Liều</th></tr>"

drug.table.forEach(r=>{

let highlight = (crcl && crcl >= r.min && crcl < r.max) ? "class='highlight'" : ""

html += "<tr " + highlight + ">"
html += "<td>" + r.label + "</td>"
html += "<td>" + r.dose + "</td>"
html += "</tr>"

})

html += "</table>"


/* HIỂN THỊ LIỀU THEO CÂN NẶNG */

if(drug.mgkg && weight){

html += "<div style='margin-top:10px;padding:10px;background:#fff3cd;border-radius:6px'>"
html += "<b>Liều theo cân nặng:</b><br>"

if(Array.isArray(drug.mgkg)){

let min = drug.mgkg[0] * weight
let max = drug.mgkg[1] * weight

html += drug.mgkg[0] + "–" + drug.mgkg[1] + " mg/kg × " + weight + " kg = "
html += "<span style='color:#d63384;font-weight:bold'>"
html += min.toFixed(0) + " – " + max.toFixed(0) + " mg"
html += "</span>"

}else{

let mg = drug.mgkg * weight

html += drug.mgkg + " mg/kg × " + weight + " kg = "
html += "<span style='color:#d63384;font-weight:bold'>"
html += mg.toFixed(0) + " mg"
html += "</span>"

}

html += "</div>"

}


if(drug.note){
html += "<div class='note'><b>Ghi chú:</b> " + drug.note + "</div>"
}

document.getElementById("result").innerHTML = html

}

/* TỰ CẬP NHẬT */

["age","weight","creat","sex"].forEach(id=>{
document.getElementById(id).addEventListener("input",calculate)
})
